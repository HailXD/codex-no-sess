name: Windows release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: false
        default: latest
        type: string

permissions:
  contents: write

concurrency:
  group: windows-release
  cancel-in-progress: true

jobs:
  release:
    name: Build and release codex.exe
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    env:
      LIBSQLITE3_FLAGS: SQLITE_DISABLE_INTRINSIC
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-pc-windows-msvc
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Restore Cargo cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            windows-cargo-
      - name: Build codex.exe
        shell: pwsh
        run: cargo rustc --locked --release -p codex-cli --bin codex --target x86_64-pc-windows-msvc -- -C debuginfo=0 -C strip=symbols
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || 'latest' }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^[A-Za-z0-9][A-Za-z0-9._-]*$') {
            throw "Release tag contains unsupported characters"
          }
          $asset = Join-Path $env:GITHUB_WORKSPACE "codex-rs\target\x86_64-pc-windows-msvc\release\codex.exe"
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $asset --clobber --repo $env:GITHUB_REPOSITORY
            gh release edit $env:RELEASE_TAG --latest --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $env:RELEASE_TAG $asset --latest --target $env:GITHUB_SHA --title $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY
          }
